# ============================================================
# CI/CD — cfdi-pdf  |  Tests · Release · PyPI (OIDC)
#
# Flujo:
#   push/PR → test (matrix 3.12/3.13)
#   push main + versión nueva → build → validate → release → PyPI
#
# Secrets requeridos: CODECOV_TOKEN
# PyPI: Trusted Publishing/OIDC — sin API token
# ============================================================

name: CI / CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"

    - name: Cache & install system deps (WeasyPrint)
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: >
          libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0
          libgdk-pixbuf2.0-0 libcairo2 libffi-dev shared-mime-info
          libgirepository1.0-dev gir1.2-pango-1.0 fonts-liberation
        version: 1.0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint (Ruff)
      run: |
        ruff check .
        ruff format --check .

    - name: Typecheck (mypy)
      run: mypy src

    - name: Test (pytest + coverage)
      run: |
        pytest \
          --cov=cfdi_pdf \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=70 \
          --junitxml=junit.xml \
          -o junit_family=legacy

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    # Reemplaza codecov/test-results-action@v1 (deprecada)
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        files: ./junit.xml
        report_type: test_results
        token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────
  # JOB 2 — Audit de seguridad
  # ────────────────────────────────────────────────────────────
  audit:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Audit dependencies
      run: pip-audit --desc -r <(pip-compile pyproject.toml --quiet 2>/dev/null || echo "")
      continue-on-error: false

  # ────────────────────────────────────────────────────────────
  # JOB 3 — Release
  # ────────────────────────────────────────────────────────────
  release:
    name: Release & publish
    runs-on: ubuntu-latest
    needs: [test, audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout (full history para tags)
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      with:
        fetch-depth: 0

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Cache & install system deps (WeasyPrint)
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: >
          libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0
          libgdk-pixbuf2.0-0 libcairo2 libffi-dev shared-mime-info
          libgirepository1.0-dev gir1.2-pango-1.0 fonts-liberation
        version: 1.0

    - name: Install build + validation tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        pip install -e ".[dev]"

    - name: Read version from pyproject.toml
      id: version
      run: |
        VERSION=$(python -c "
        import tomllib
        with open('pyproject.toml', 'rb') as f:
            data = tomllib.load(f)
        print(data['project']['version'])
        ")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "Detected version: $VERSION"

    - name: Check if tag already exists
      id: tag_check
      run: |
        if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "New version detected: ${{ steps.version.outputs.tag }}"
        fi

    - name: Build package (sdist + wheel)
      if: steps.tag_check.outputs.exists == 'false'
      run: python -m build

    - name: Validate package metadata (twine check)
      if: steps.tag_check.outputs.exists == 'false'
      run: twine check --strict dist/*

    - name: Smoke test wheel install
      if: steps.tag_check.outputs.exists == 'false'
      run: |
        pip install dist/*.whl --force-reinstall
        python -c "import cfdi_pdf; print('Import OK:', cfdi_pdf.__version__)"

    - name: Create git tag
      if: steps.tag_check.outputs.exists == 'false'
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${{ steps.version.outputs.tag }}" \
                -m "Release ${{ steps.version.outputs.tag }}"
        git push origin "${{ steps.version.outputs.tag }}"

    - name: Create GitHub Release
      if: steps.tag_check.outputs.exists == 'false'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        generate_release_notes: true
        files: dist/*

    - name: Publish to PyPI (OIDC)
      if: steps.tag_check.outputs.exists == 'false'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
