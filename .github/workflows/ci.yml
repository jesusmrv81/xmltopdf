# ============================================================
# CI/CD — cfdi-pdf  |  Tests · Release · PyPI (OIDC)
#
# Flujo:
#   push/PR → test (matrix 3.12/3.13)
#   push main + versión nueva → build → validate → release → PyPI
#
# Secrets requeridos: CODECOV_TOKEN
# PyPI: Trusted Publishing/OIDC — sin API token
# ============================================================

name: CI / CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancela runs anteriores del mismo PR/branch para ahorrar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────────────────
# JOB 1 — Tests
# ────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read  # mínimo necesario para checkout

    strategy:
      fail-fast: false  # si 3.13 falla, 3.12 sigue corriendo (y viceversa)
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # SHA pinneado: protege contra tag hijacking en supply chain

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"  # evita reinstalar deps en cada run (~2-3 min ahorrados)

    # Cache de librerías del sistema de WeasyPrint
    # awalsh128/cache-apt-pkgs-action pinneado a SHA estable
    - name: Cache & install system deps (WeasyPrint)
      uses: awalsh128/cache-apt-pkgs-action@5b6568a0e9723e14bbf4b32e7f9e02c48d254b45  # v1.4.2
      with:
        packages: >
          libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0
          libgdk-pixbuf2.0-0 libcairo2 libffi-dev shared-mime-info
          libgirepository1.0-dev gir1.2-pango-1.0 fonts-liberation
        version: 1.0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint (Ruff)
      run: |
        ruff check .
        ruff format --check .

    - name: Typecheck (mypy)
      run: mypy src

    # --cov-fail-under=70: el job falla si la cobertura cae bajo 70%
    - name: Test (pytest + coverage)
      run: |
        pytest \
          --cov=cfdi_pdf \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=70 \
          --junitxml=junit.xml \
          -o junit_family=legacy

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    # Test Analytics: detecta flaky tests y tendencias de duración
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────
  # JOB 2 — Audit de seguridad
  # Corre en paralelo con test, solo en push a main
  # ────────────────────────────────────────────────────────────
  audit:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Audit dependencies
      # Escanea CVEs en todas las dependencias del proyecto
      # --desc: muestra descripción de cada vulnerabilidad encontrada
      run: pip-audit --desc -r <(pip-compile pyproject.toml --quiet 2>/dev/null || echo "")
      # Fallback si no tienes pip-compile: audita el entorno instalado
      continue-on-error: false

  # ────────────────────────────────────────────────────────────
  # JOB 3 — Release
  # Solo corre en push a main después de tests + audit exitosos
  # ────────────────────────────────────────────────────────────
  release:
    name: Release & publish
    runs-on: ubuntu-latest
    needs: [test, audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write  # crear tags y GitHub Releases
      id-token: write  # OIDC Trusted Publishing — sin API token en PyPI

    steps:
    - name: Checkout (full history para tags)
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      with:
        fetch-depth: 0  # necesario para ver todos los tags existentes

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Cache & install system deps (WeasyPrint)
      uses: awalsh128/cache-apt-pkgs-action@5b6568a0e9723e14bbf4b32e7f9e02c48d254b45  # v1.4.2
      with:
        packages: >
          libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0
          libgdk-pixbuf2.0-0 libcairo2 libffi-dev shared-mime-info
          libgirepository1.0-dev gir1.2-pango-1.0 fonts-liberation
        version: 1.0

    - name: Install build + validation tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        pip install -e ".[dev]"

    # Lee version del pyproject.toml usando tomllib (stdlib Python 3.11+)
    - name: Read version from pyproject.toml
      id: version
      run: |
        VERSION=$(python -c "
        import tomllib
        with open('pyproject.toml', 'rb') as f:
            data = tomllib.load(f)
        print(data['project']['version'])
        ")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "Detected version: $VERSION"

    # Si el tag ya existe, todos los pasos siguientes se saltean
    - name: Check if tag already exists
      id: tag_check
      run: |
        if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "New version detected: ${{ steps.version.outputs.tag }}"
        fi

    - name: Build package (sdist + wheel)
      if: steps.tag_check.outputs.exists == 'false'
      run: python -m build

    # twine check valida metadata, README renderizable y estructura del paquete
    # Detecta errores antes de subir a PyPI (evita releases rotos)
    - name: Validate package metadata (twine check)
      if: steps.tag_check.outputs.exists == 'false'
      run: twine check --strict dist/*

    # Instala el wheel en un entorno limpio y hace un smoke test básico
    # Detecta imports rotos, dependencias faltantes, etc.
    - name: Smoke test wheel install
      if: steps.tag_check.outputs.exists == 'false'
      run: |
        pip install dist/*.whl --force-reinstall
        python -c "import cfdi_pdf; print('Import OK:', cfdi_pdf.__version__)"

    # Crea el tag en git ANTES de crear el Release de GitHub
    # Necesario para que softprops/action-gh-release lo encuentre limpio
    - name: Create git tag
      if: steps.tag_check.outputs.exists == 'false'
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${{ steps.version.outputs.tag }}" \
                -m "Release ${{ steps.version.outputs.tag }}"
        git push origin "${{ steps.version.outputs.tag }}"

    # Crea el GitHub Release con changelog auto-generado desde commits
    # generate_release_notes usa los commits entre el tag anterior y este
    - name: Create GitHub Release
      if: steps.tag_check.outputs.exists == 'false'
      uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191  # v2.2.1
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        generate_release_notes: true
        files: dist/*

    # OIDC Trusted Publishing — PyPI valida la identidad del workflow
    # directamente con GitHub sin necesitar PYPI_API_TOKEN
    # Requiere configurar Trusted Publisher en pypi.org primero
    - name: Publish to PyPI (OIDC)
      if: steps.tag_check.outputs.exists == 'false'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
        # Sin password: OIDC se autentica automáticamente vía id-token
